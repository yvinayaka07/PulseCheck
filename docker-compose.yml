# =============================================================================
# PulseCheck – Docker Compose
# Usage: docker compose up --build
# =============================================================================

version: "3.9"

services:
  pulsecheck:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: pulsecheck_api
    image: pulsecheck:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env.example          # swap for .env in real deployments
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pulsecheck_net

networks:
  pulsecheck_net:
    driver: bridge
