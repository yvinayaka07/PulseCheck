# =============================================================================
# PulseCheck – GitHub Actions CI/CD Pipeline
# Triggers: push to main, pull requests targeting main
# =============================================================================

name: PulseCheck CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: pulsecheck
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint & Test ──────────────────────────────────────────────────────
  test:
    name: Install, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov httpx

      - name: Create .env for tests
        run: cp .env.example .env

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 2: Build Docker Image ───────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        run: |
          docker run -d \
            --name pulsecheck_smoke \
            -p 8000:8000 \
            -e APP_ENV=production \
            ${{ env.IMAGE_NAME }}:latest
          # Wait for the service to start
          sleep 8
          curl --fail http://localhost:8000/ | grep '"status":"running"' || \
            (docker logs pulsecheck_smoke && exit 1)
          docker stop pulsecheck_smoke

  # ── Job 3: Simulate Deployment ──────────────────────────────────────────────
  deploy-simulation:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Simulate deployment to ECS (dry-run)
        run: |
          echo "========================================"
          echo "  PulseCheck Deployment Simulation"
          echo "========================================"
          echo "Commit SHA  : ${{ github.sha }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp   : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "[1/4] Authenticating with AWS ECR ... (simulated)"
          echo "[2/4] Pushing image pulsecheck:${{ github.sha }} ... (simulated)"
          echo "[3/4] Updating ECS task definition ... (simulated)"
          echo "[4/4] Triggering ECS service update ... (simulated)"
          echo ""
          echo "Deployment simulation complete. ✅"
